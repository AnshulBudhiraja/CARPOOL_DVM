<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Registration | Carpool</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f43f5e;
            --primary-hover: #e11d48;
            --accent: #fb7185;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(244, 63, 94, 0.1) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 41, 59, 0.2) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 2rem;
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fb7185, #f43f5e);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* Styling Django form fields */
        form p {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dim);
            padding-left: 0.5rem;
        }

        input,
        textarea,
        select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .helptext,
        .errorlist {
            font-size: 0.8rem;
            color: var(--text-dim);
            list-style: none;
            padding: 0 0.5rem;
        }

        .errorlist {
            color: #f87171;
            margin-top: 0.25rem;
        }

        .btn-submit {
            margin-top: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(244, 63, 94, 0.3);
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(244, 63, 94, 0.4);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-main);
        }

        ul.errorlist {
            margin-bottom: 1rem;
            background: rgba(248, 113, 113, 0.1);
            border-radius: 8px;
            padding: 0.5rem 1rem;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <a href="{% url 'home' %}" class="back-link">
            ← Back to home
        </a>
        <div class="header">
            <h1>Start Driving</h1>
            <p>Complete your driver profile to get started</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            {% if form.non_field_errors %}
            <div class="errorlist">
                {{ form.non_field_errors }}
            </div>
            {% endif %}

            {{ form.as_p }}

            <button type="submit" class="btn-submit">Create Driver Account</button>
        </form>

        <div style="margin-top: 1.75rem; text-align: center; font-size: 0.875rem; color: #94a3b8;">
            Already have a driver account?
            <a href="{% url 'driver_login_view' %}"
                style="color: #f43f5e; font-weight: 600; text-decoration: none;">
                Log in
            </a>
        </div>
    </div>
</body>

</html>
