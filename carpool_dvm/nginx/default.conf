upstream carpool_app {
    server web:8000;
}

server {
    listen 80;

    server_name 13.61.25.122 carpool-anshul.duckdns.org 13.61.25.122.nip.io localhost;

    client_max_body_size 20M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 13.61.25.122 carpool-anshul.duckdns.org 13.61.25.122.nip.io localhost;
    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/carpool-anshul.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/carpool-anshul.duckdns.org/privkey.pem;

    # 6. Pass all other requests to Django
    location / {
        proxy_pass http://carpool_app;

        # Standard proxy headers (helps Django know the real user IP)
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        proxy_redirect off;

        # Timeouts to prevent the connection from dropping during long tasks
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }
}